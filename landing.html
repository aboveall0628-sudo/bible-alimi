<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F7F5F2" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1A1815" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="manifest.json">
    <title>Sanctum OS</title>
    <meta name="description" content="Sanctum OS — 매일의 일상, 매일의 성소, 하나의 시스템">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
    <link rel="icon" type="image/svg+xml" href="assets/sanctum-mark.svg">
    <link rel="apple-touch-icon" href="assets/favicon-32.png">
    <link rel="mask-icon" href="assets/sanctum-mark.svg" color="#1A1814">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Sanctum">

    <!-- Open Graph / Twitter Card -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Sanctum OS">
    <meta property="og:description" content="매일의 일상, 매일의 성소, 하나의 시스템">
    <meta property="og:image" content="https://aboveall0628-sudo.github.io/sanctumos/assets/og-image.png">
    <meta property="og:url" content="https://aboveall0628-sudo.github.io/sanctumos/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Sanctum OS">
    <meta name="twitter:description" content="매일의 일상, 매일의 성소, 하나의 시스템">
    <meta name="twitter:image" content="https://aboveall0628-sudo.github.io/sanctumos/assets/og-image.png">

    <!-- 다크모드 FOUC 가드: CSS 로드 전에 data-theme 적용 (themeManager와 동일 정책: dark만 속성 부여) -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('sanctum-theme');
                if (!t && matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
                if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            } catch (_) {}
        })();
    </script>

    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="landing.css">
    <script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js" defer></script>
    <!-- Phase E-9/M-1: 인앱 브라우저 감지 (카카오톡 등) — landing.js보다 먼저 로드 -->
    <script src="utils/inAppBrowser.js" defer></script>
    <script src="landing.js" defer></script>
</head>
<body>
    <main class="landing-root" aria-labelledby="landing-title">
        <div class="landing-stack" id="landing-stack">

            <!-- 1. 로고 -->
            <div class="landing-logo" aria-hidden="true">
                <svg viewBox="0 0 105 110" class="landing-logo-mark">
                    <title>Sanctum OS 로고</title>
                    <path fill="none" stroke="currentColor" stroke-width="6"
                          stroke-linecap="square" stroke-linejoin="miter" stroke-miterlimit="2"
                          d="M 50 10 L 50 60 L 85 60 L 85 25 L 20 25 L 20 75 L 70 75 L 70 40 L 35 40 L 35 100"/>
                </svg>
            </div>

            <!-- 2. 제목 — 베타 단계 배지 함께 (v95 사용자 명시 "베타버전이라고 명시") -->
            <h1 id="landing-title" class="landing-title">
                Sanctum OS <span class="landing-beta-badge" aria-label="베타 단계">BETA</span>
            </h1>

            <!-- 3. 부제목 -->
            <p class="landing-subtitle">매일의 일상, 매일의 성소, 하나의 시스템</p>

            <!-- 4. Primary CTA — anchor로 두면 JS가 죽거나 핸들러 등록 전에 눌러도 동작 -->
            <a id="landing-cta" class="landing-cta" href="./index.html?login=true"
               role="button" aria-label="Google 계정으로 시작하기">
                Google 계정으로 시작하기
            </a>

            <!-- 5. 기능 3 카드 — 1.5층 가치 명제 보조. 묵상·도트·리포트 한 흐름 안내. -->
            <section class="landing-features" aria-label="Sanctum OS 핵심 기능">
                <article class="landing-feature">
                    <div class="landing-feature-icon" aria-hidden="true">
                        <i data-lucide="book-open"></i>
                    </div>
                    <h2 class="landing-feature-title">말씀과 깊이 만나는 자리</h2>
                    <p class="landing-feature-desc">매일의 묵상이 흘러가 버리지 않게. 깨달은 한 줄을 오늘의 결단으로 이어드려요.</p>
                </article>
                <article class="landing-feature">
                    <div class="landing-feature-icon" aria-hidden="true">
                        <i data-lucide="circle-dot"></i>
                    </div>
                    <h2 class="landing-feature-title">오늘을 한 점으로</h2>
                    <p class="landing-feature-desc">시간표에 옮긴 결단이 잘 됐는지 3초만에 평가해요. 매일의 결이 쌓여 흐름이 돼요.</p>
                </article>
                <article class="landing-feature">
                    <div class="landing-feature-icon" aria-hidden="true">
                        <i data-lucide="line-chart"></i>
                    </div>
                    <h2 class="landing-feature-title">AI가 흐름을 읽어드려요</h2>
                    <p class="landing-feature-desc">주간·월간 리포트가 자동으로. 어떤 자리에서 평안했고 어디서 마음이 흔들렸는지 한눈에.</p>
                </article>
            </section>

            <!-- 7. 푸터 -->
            <footer class="landing-footer">
                © 2026 Sanctum OS
                <span class="landing-footer-sep">·</span>
                <a href="privacy.html" class="landing-footer-link">개인정보처리방침</a>
                <span class="landing-footer-sep">·</span>
                <a href="terms.html" class="landing-footer-link">서비스 이용약관</a>
            </footer>

        </div>
    </main>
</body>
</html>
