<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
    <button style="display:flex; flex-direction:column; align-items:center; gap:6px; padding:12px 8px; border:2px solid var(--brand-primary); border-radius:12px; background:var(--brand-soft); cursor:pointer;">
      <span style="font-size:26px;">😀</span><span style="font-size:12px; font-weight:600;">잘 했어요</span><span style="font-size:9px; background:var(--hover); padding:1px 4px; border-radius:3px;">1</span>
    </button>
    <button style="display:flex; flex-direction:column; align-items:center; gap:6px; padding:12px 8px; border:2px solid var(--line); border-radius:12px; background:var(--surface-elevated); cursor:pointer;">
      <span style="font-size:26px;">🙂</span><span style="font-size:12px; font-weight:600;">조금 했어요</span><span style="font-size:9px; background:var(--hover); padding:1px 4px; border-radius:3px;">2</span>
    </button>
    <button style="display:flex; flex-direction:column; align-items:center; gap:6px; padding:12px 8px; border:2px solid var(--line); border-radius:12px; background:var(--surface-elevated); cursor:pointer;">
      <span style="font-size:26px;">🔄</span><span style="font-size:12px; font-weight:600;">다른 걸 했어요</span><span style="font-size:9px; background:var(--hover); padding:1px 4px; border-radius:3px;">3</span>
    </button>
    <button style="display:flex; flex-direction:column; align-items:center; gap:6px; padding:12px 8px; border:2px solid var(--line); border-radius:12px; background:var(--surface-elevated); cursor:pointer;">
      <span style="font-size:26px;">😣</span><span style="font-size:12px; font-weight:600;">못 했어요</span><span style="font-size:9px; background:var(--hover); padding:1px 4px; border-radius:3px;">4</span>
    </button>
  </div>
  <div class="muted" style="margin-top:12px; font-size:12px;">3초 룰 — 1~4 키로 빠르게 도트를 채울 수 있어요. 선택된 버튼은 brand 보더 + brand-soft 배경.</div>
</div></body></html>
