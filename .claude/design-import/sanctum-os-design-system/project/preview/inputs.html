<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">
  <div style="display:flex; gap:14px; flex-wrap:wrap;">
    <input placeholder="비밀번호를 입력해 주세요" style="flex:1; min-width:220px; padding:14px 16px; border:2px solid var(--line); border-radius:12px; font:400 16px var(--font); background:var(--surface-card); text-align:center;">
    <select style="padding:8px 12px; border:1px solid var(--line); border-radius:12px; background:var(--surface-elevated); color:var(--ink-secondary); font:400 13px var(--font);"><option>영적</option><option>관계</option></select>
  </div>
  <div style="margin-top:14px; min-height:80px; padding:16px; border:1px solid var(--line); border-radius:12px; background:var(--surface-elevated); font-size:15px; line-height:1.65; color:var(--ink-secondary);">말씀을 곱씹다 떠오른 생각을 한 줄씩 적어 보세요</div>
  <div class="muted" style="margin-top:10px; font-size:12px;">인풋은 elevated 배경, 포커스 시 brand 보더 + card 배경으로 한 단 위로. 비밀번호 인풋만 2px 보더 + 가운데 정렬.</div>
</div></body></html>
