<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">
  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <span style="display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:9999px; background:#3E5C76; color:#fff; font-size:12px; font-weight:600;">전체 <span style="background:rgba(255,255,255,.25); padding:1px 7px; border-radius:9999px; font-size:11px;">12</span></span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:9999px; background:var(--surface-card); border:1px solid var(--line); color:var(--ink-secondary); font-size:12px;">영적 <span style="background:var(--hover); padding:1px 7px; border-radius:9999px; font-size:11px;">4</span></span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:9999px; background:var(--surface-card); border:1px solid var(--line); color:var(--ink-secondary); font-size:12px;">관계 <span style="background:var(--hover); padding:1px 7px; border-radius:9999px; font-size:11px;">3</span></span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:9999px; background:var(--surface-card); border:1px solid var(--line); color:var(--ink-secondary); font-size:12px;">일·소명 <span style="background:var(--hover); padding:1px 7px; border-radius:9999px; font-size:11px;">2</span></span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:9999px; background:var(--surface-card); border:1px solid var(--line); color:var(--ink-secondary); font-size:12px;">건강 <span style="background:var(--hover); padding:1px 7px; border-radius:9999px; font-size:11px;">1</span></span>
  </div>
  <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:14px;">
    <span style="padding:4px 10px; border:1px solid var(--line); border-radius:16px; background:var(--surface-elevated); font-size:12px; color:var(--ink-secondary);">정직</span>
    <span style="padding:4px 10px; border:1px solid var(--brand-primary); border-radius:16px; background:var(--brand-primary); color:#fff; font-size:12px;">집중</span>
    <span style="padding:4px 10px; border:1px solid var(--line); border-radius:16px; background:var(--surface-elevated); font-size:12px; color:var(--ink-secondary);">감사</span>
  </div>
  <div class="muted" style="margin-top:12px; font-size:12px;">필터 칩(pill, 카운트 동반) · 라벨 칩(16px, 선택 시 brand fill).</div>
</div></body></html>
