<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">
  <div style="display:flex; gap:18px; align-items:center;">
    <div style="display:flex; gap:12px;">
      <div style="width:64px; height:64px; background:#fff; border:1px solid var(--line); border-radius:8px;"></div>
      <div style="width:64px; height:64px; background:#fff; border:1px solid var(--line); border-radius:12px;"></div>
      <div style="width:64px; height:64px; background:#fff; border:1px solid var(--line); border-radius:16px;"></div>
      <div style="width:96px; height:32px; background:#fff; border:1px solid var(--line); border-radius:9999px; align-self:center;"></div>
    </div>
    <div style="height:64px; width:1px; background:var(--line);"></div>
    <div style="display:flex; gap:16px;">
      <div style="width:80px; height:64px; background:#fff; border-radius:12px; box-shadow: 0 1px 3px rgba(0,0,0,.06);"></div>
      <div style="width:80px; height:64px; background:#fff; border-radius:12px; box-shadow: 0 8px 24px rgba(0,0,0,.08);"></div>
    </div>
  </div>
  <div style="display:grid; grid-template-columns: repeat(6, auto); gap:10px 18px; margin-top:14px; font-size:11px;">
    <div><span class="mono">sm</span> 8px</div><div><span class="mono">md</span> 12px</div><div><span class="mono">lg</span> 16px</div><div><span class="mono">pill</span> 9999</div>
    <div><span class="mono">shadow-sm</span></div><div><span class="mono">shadow-lg</span></div>
  </div>
</div></body></html>
