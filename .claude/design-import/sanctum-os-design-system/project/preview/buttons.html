<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">
  <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
    <button style="background:#3E5C76; color:#fff; border:none; padding:10px 18px; border-radius:12px; font:600 14px var(--font); cursor:pointer;">데이터 옮기기</button>
    <button style="background:none; border:none; color:#3E5C76; padding:10px 14px; border-radius:12px; font:600 14px var(--font); cursor:pointer;">Google 연결</button>
    <button style="background:none; border:1px dashed var(--line); color:var(--ink-secondary); padding:10px 14px; border-radius:12px; font:400 14px var(--font); cursor:pointer; width:auto;">+ 새 결단 적기</button>
    <button style="background:#6BBF7B; color:#fff; border:none; padding:10px 18px; border-radius:12px; font:600 14px var(--font); cursor:pointer;">📥 전체 데이터 받기</button>
    <button style="background:#3E5C76; color:#fff; border:none; padding:10px 18px; border-radius:12px; font:600 14px var(--font); cursor:not-allowed; opacity:0.5;">잠금</button>
  </div>
  <div class="muted" style="margin-top:14px; font-size:12px;">1차 (brand) · 텍스트 (브랜드 컬러, 배경 없음) · 점선 add (대시 보더) · 위험 없음(녹색 = 저장·확인) · 비활성 opacity 0.5.</div>
</div></body></html>
